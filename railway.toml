# Railway deployment configuration
# Docs: https://docs.railway.app/deploy/config-as-code

[build]
builder = "NIXPACKS"

# â”€â”€â”€ API Service â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
[[services]]
name          = "zeal-api"
source        = "server"
startCommand  = "node src/app.js"

[services.build]
buildCommand  = "npm ci"

[services.deploy]
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath         = "/health"
healthcheckTimeout      = 300

# â”€â”€â”€ Frontend Service â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
[[services]]
name          = "zeal-web"
source        = "client"
startCommand  = "npx serve -s build -l $PORT"

[services.build]
buildCommand  = "npm ci && npm run build"
